services:
  - type: web
    name: cleared-live-platform
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --graceful-timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cleared-platform-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DOCUSIGN_ACCOUNT_ID
        sync: false
      - key: DOCUSIGN_INTEGRATION_KEY
        sync: false
      - key: DOCUSIGN_USER_ID
        sync: false
      - key: DOCUSIGN_PRIVATE_KEY
        sync: false
      - key: DOCUSIGN_ENV
        value: demo
      - key: RESEND_API_KEY
        sync: false

  # Daily follow-ups for unsigned general releases (day 3 / 6 / 9, then flag).
  - type: cron
    name: release-reminders
    env: python
    pythonVersion: "3.11.9"
    schedule: "0 14 * * *"        # 14:00 UTC daily (~9–10am ET)
    buildCommand: pip install -r requirements.txt
    startCommand: flask release-reminders
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: DATABASE_URL
        fromDatabase:
          name: cleared-platform-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: cleared-platform-db
    databaseName: cleared_platform
    user: cleared_platform
