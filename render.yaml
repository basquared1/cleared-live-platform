services:
  - type: web
    name: cleared-live-platform
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --graceful-timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cleared-platform-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DOCUSIGN_ACCOUNT_ID
        sync: false
      - key: DOCUSIGN_INTEGRATION_KEY
        sync: false
      - key: DOCUSIGN_USER_ID
        sync: false
      - key: DOCUSIGN_PRIVATE_KEY
        sync: false
      - key: DOCUSIGN_ENV
        value: demo
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: cleared-platform-db
    databaseName: cleared_platform
    user: cleared_platform
