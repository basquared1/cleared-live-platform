services:
  - type: web
    name: cleared-live-platform
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cleared-platform-db
          property: connectionString

databases:
  - name: cleared-platform-db
    databaseName: cleared_platform
    user: cleared_platform
