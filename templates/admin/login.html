{% extends "base.html" %}
{% block title %}Admin — Cleared.live{% endblock %}
{% block navbar %}{% endblock %}
{% block container_class %}container py-5{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
<div class="col-sm-10 col-md-6 col-lg-4">
  <div class="text-center mb-4">
    <div class="fw-bold fs-4 text-navy mb-1">Cleared<span class="text-warning">.</span>live</div>
    <div class="text-muted small">Internal Admin</div>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <h5 class="fw-bold text-navy mb-4">Admin Login</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Username</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary fw-semibold">Sign In</button>
        </div>
      </form>
    </div>
  </div>
</div>
</div>
{% endblock %}
